<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ForgePro - Logowanie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080810;
  --surface:#12121a;
  --surface-2:#171722;
  --border:#262637;
  --text:#f2f1f5;
  --muted:#8f90a8;
  --orange:#e07b39;
  --orange-soft:rgba(224,123,57,.12);
  --danger:#ff7a7a;
  --radius:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;min-height:100%;background:
  radial-gradient(circle at top, rgba(224,123,57,.2), transparent 28%),
  linear-gradient(180deg, #0b0b14 0%, #080810 100%);
  color:var(--text);font-family:'DM Sans',sans-serif;}
body{display:flex;align-items:stretch;justify-content:center;padding:24px 16px;}
.shell{width:min(100%,440px);display:flex;flex-direction:column;gap:16px;}
.brand{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 2px 0;
}
.logo{display:flex;align-items:center;gap:12px;font-family:'Syne',sans-serif;font-size:32px;font-weight:800;letter-spacing:-.04em;}
.logo span{color:var(--orange);}
.logo-mark{width:42px;height:42px;flex-shrink:0;}
.tag{
  font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--orange);padding:7px 10px;border:1px solid rgba(224,123,57,.25);
  border-radius:999px;background:var(--orange-soft);
}
.card{
  background:rgba(18,18,26,.92);
  border:1px solid var(--border);
  border-radius:28px;
  padding:24px;
  box-shadow:0 16px 48px rgba(0,0,0,.28);
}
.eyebrow{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
h1{margin:0 0 10px;font-family:'Syne',sans-serif;font-size:36px;line-height:.95;letter-spacing:-.05em;}
.lead{margin:0 0 18px;color:#c9c8d3;line-height:1.6;font-size:14px;}
.notice{
  display:none;
  margin-bottom:14px;padding:12px 14px;border-radius:14px;
  border:1px solid rgba(255,255,255,.08);background:var(--surface-2);color:var(--text);
  font-size:13px;line-height:1.5;
}
.notice.show{display:block;}
.notice.error{border-color:rgba(255,122,122,.28);color:#ffd1d1;background:rgba(255,122,122,.08);}
.notice.warn{border-color:rgba(224,123,57,.28);background:var(--orange-soft);}
.tabs{display:flex;gap:8px;margin-bottom:16px;}
.tab{
  flex:1;border:none;border-radius:14px;background:var(--surface-2);color:var(--muted);
  padding:12px;font:700 14px 'DM Sans',sans-serif;cursor:pointer;
}
.tab.active{background:var(--orange);color:#fff;}
.fields{display:flex;flex-direction:column;gap:12px;}
.field label{display:block;margin-bottom:6px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.field input{
  width:100%;border:1px solid var(--border);background:var(--surface-2);color:var(--text);
  border-radius:14px;padding:14px 15px;font:500 15px 'DM Sans',sans-serif;outline:none;
}
.field input:focus{border-color:rgba(224,123,57,.45);box-shadow:0 0 0 3px rgba(224,123,57,.12);}
.actions{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
.btn{
  width:100%;border:none;border-radius:16px;padding:14px 16px;cursor:pointer;
  font:700 15px 'DM Sans',sans-serif;
}
.btn-primary{background:var(--orange);color:#fff;box-shadow:0 10px 28px rgba(224,123,57,.22);}
.btn-secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border);}
.btn[disabled]{opacity:.55;cursor:not-allowed;box-shadow:none;}
.row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:14px;}
.link-btn{
  background:none;border:none;padding:0;color:var(--orange);cursor:pointer;
  font:700 13px 'DM Sans',sans-serif;
}
.meta{margin-top:18px;color:var(--muted);font-size:12px;line-height:1.6;}
.loading{display:inline-flex;align-items:center;gap:8px;}
.loading::before{
  content:'';width:14px;height:14px;border-radius:50%;
  border:2px solid rgba(255,255,255,.25);border-top-color:#fff;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
@media (max-width:480px){
  body{padding:18px 12px;}
  .card{padding:20px;border-radius:24px;}
  h1{font-size:30px;}
  .logo{font-size:28px;}
}
</style>
</head>
<body>
  <div class="shell">
    <div class="brand">
      <div class="logo">
        <svg class="logo-mark" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="28" height="28" rx="7" fill="#E07B39"/>
          <path d="M8 20L13 8L16 14L19 10L21 20" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="13" cy="8" r="1.5" fill="white"/>
        </svg>
        Forge<span>Pro</span>
      </div>
      <div class="tag">Account</div>
    </div>

    <section class="card">
      <div class="eyebrow">Logowanie</div>
      <h1>Wejdź do aplikacji bez chaosu.</h1>
      <p class="lead">Uprościłem flow: najpierw konto, potem trening. Po zalogowaniu wracasz prosto do ForgePro.</p>

      <div id="authNotice" class="notice"></div>

      <div class="tabs">
        <button class="tab active" id="loginTab" type="button">Logowanie</button>
        <button class="tab" id="registerTab" type="button">Rejestracja</button>
      </div>

      <form id="authForm">
        <div class="fields">
          <div class="field">
            <label for="emailInput">Email</label>
            <input id="emailInput" type="email" autocomplete="email" placeholder="twoj@email.com" required>
          </div>
          <div class="field">
            <label for="passwordInput">Hasło</label>
            <input id="passwordInput" type="password" autocomplete="current-password" placeholder="Minimum 6 znaków" required>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="submitBtn" type="submit">Zaloguj się</button>
          <button class="btn btn-secondary" id="googleBtn" type="button">Kontynuuj z Google</button>
        </div>
      </form>

      <div class="row">
        <button class="link-btn" id="modeSwitchBtn" type="button">Nie masz konta? Załóż konto</button>
        <button class="link-btn" id="resetBtn" type="button">Reset hasła</button>
      </div>

      <div class="meta">
        Jeśli auth nie jest jeszcze skonfigurowany w Railway, ten ekran pokaże Ci jasny komunikat zamiast udawać, że logowanie działa.
      </div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import {
      getAuth,
      GoogleAuthProvider,
      createUserWithEmailAndPassword,
      onAuthStateChanged,
      sendPasswordResetEmail,
      signInWithEmailAndPassword,
      signInWithPopup,
      signOut,
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    const AUTH_SESSION_KEY = 'forgepro_auth_session_v1';
    const AUTH_USER_KEY = 'forgepro_auth_user_v1';

    const authNotice = document.getElementById('authNotice');
    const authForm = document.getElementById('authForm');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const submitBtn = document.getElementById('submitBtn');
    const googleBtn = document.getElementById('googleBtn');
    const modeSwitchBtn = document.getElementById('modeSwitchBtn');
    const resetBtn = document.getElementById('resetBtn');
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');

    let isRegisterMode = false;
    let authEnabled = false;
    let auth;
    let googleProvider;

    function setNotice(message, tone = 'warn') {
      authNotice.textContent = message;
      authNotice.className = `notice show ${tone}`;
    }

    function clearNotice() {
      authNotice.textContent = '';
      authNotice.className = 'notice';
    }

    function setLoading(isLoading, label) {
      submitBtn.disabled = isLoading || !authEnabled;
      googleBtn.disabled = isLoading || !authEnabled;
      resetBtn.disabled = isLoading || !authEnabled;
      if (isLoading) {
        submitBtn.innerHTML = `<span class="loading">${label}</span>`;
      } else {
        submitBtn.textContent = isRegisterMode ? 'Załóż konto' : 'Zaloguj się';
      }
    }

    function setMode(nextRegisterMode) {
      isRegisterMode = nextRegisterMode;
      loginTab.classList.toggle('active', !nextRegisterMode);
      registerTab.classList.toggle('active', nextRegisterMode);
      submitBtn.textContent = nextRegisterMode ? 'Załóż konto' : 'Zaloguj się';
      modeSwitchBtn.textContent = nextRegisterMode
        ? 'Masz już konto? Zaloguj się'
        : 'Nie masz konta? Załóż konto';
      passwordInput.autocomplete = nextRegisterMode ? 'new-password' : 'current-password';
      clearNotice();
    }

    function saveSession(user) {
      const payload = {
        uid: user.uid,
        email: user.email || '',
        ts: Date.now(),
      };
      localStorage.setItem(AUTH_SESSION_KEY, JSON.stringify(payload));
      localStorage.setItem(AUTH_USER_KEY, JSON.stringify(payload));
    }

    function clearSession() {
      localStorage.removeItem(AUTH_SESSION_KEY);
      localStorage.removeItem(AUTH_USER_KEY);
    }

    function goToApp() {
      window.location.replace('/');
    }

    function mapAuthError(error) {
      const messages = {
        'auth/email-already-in-use': 'Ten adres email jest już używany.',
        'auth/invalid-email': 'Podaj poprawny adres email.',
        'auth/user-not-found': 'Nie znaleziono takiego konta.',
        'auth/wrong-password': 'Hasło jest nieprawidłowe.',
        'auth/invalid-credential': 'Dane logowania są nieprawidłowe.',
        'auth/weak-password': 'Hasło jest za słabe. Użyj minimum 6 znaków.',
        'auth/popup-closed-by-user': 'Logowanie zostało anulowane.',
        'auth/network-request-failed': 'Brak połączenia z internetem.',
      };
      return messages[error.code] || 'Nie udało się zalogować. Spróbuj ponownie.';
    }

    async function bootAuth() {
      setLoading(true, 'Ładowanie');
      try {
        const response = await fetch('/api/config');
        const config = await response.json();
        authEnabled = Boolean(config?.auth?.enabled);

        if (!authEnabled) {
          clearSession();
          setNotice(
            'Logowanie nie jest jeszcze skonfigurowane. Ustaw w Railway zmienne FIREBASE_API_KEY, FIREBASE_AUTH_DOMAIN, FIREBASE_PROJECT_ID, FIREBASE_STORAGE_BUCKET, FIREBASE_MESSAGING_SENDER_ID i FIREBASE_APP_ID.',
            'warn'
          );
          setLoading(false);
          return;
        }

        const app = initializeApp(config.auth.firebase);
        auth = getAuth(app);
        googleProvider = new GoogleAuthProvider();

        if (new URLSearchParams(window.location.search).get('logout') === '1') {
          await signOut(auth).catch(() => {});
          clearSession();
          setNotice('Zostałeś wylogowany.', 'warn');
          setLoading(false);
          return;
        }

        onAuthStateChanged(auth, (user) => {
          if (!user) {
            clearSession();
            return;
          }
          saveSession(user);
          goToApp();
        });

        setLoading(false);
      } catch (error) {
        clearSession();
        setNotice('Nie udało się pobrać konfiguracji logowania z serwera.', 'error');
        setLoading(false);
      }
    }

    authForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!authEnabled || !auth) return;

      clearNotice();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !password) {
        setNotice('Uzupełnij email i hasło.', 'error');
        return;
      }

      setLoading(true, isRegisterMode ? 'Tworzenie konta' : 'Logowanie');
      try {
        if (isRegisterMode) {
          await createUserWithEmailAndPassword(auth, email, password);
        } else {
          await signInWithEmailAndPassword(auth, email, password);
        }
      } catch (error) {
        setNotice(mapAuthError(error), 'error');
        setLoading(false);
      }
    });

    googleBtn.addEventListener('click', async () => {
      if (!authEnabled || !auth || !googleProvider) return;
      clearNotice();
      setLoading(true, 'Logowanie');
      try {
        await signInWithPopup(auth, googleProvider);
      } catch (error) {
        setNotice(mapAuthError(error), 'error');
        setLoading(false);
      }
    });

    resetBtn.addEventListener('click', async () => {
      if (!authEnabled || !auth) return;
      clearNotice();
      const email = emailInput.value.trim();
      if (!email) {
        setNotice('Najpierw wpisz email, żeby wysłać link do resetu.', 'error');
        return;
      }

      setLoading(true, 'Wysyłanie');
      try {
        await sendPasswordResetEmail(auth, email);
        setNotice('Link do resetu hasła został wysłany na podany email.', 'warn');
      } catch (error) {
        setNotice(mapAuthError(error), 'error');
      } finally {
        setLoading(false);
      }
    });

    modeSwitchBtn.addEventListener('click', () => setMode(!isRegisterMode));
    loginTab.addEventListener('click', () => setMode(false));
    registerTab.addEventListener('click', () => setMode(true));

    setMode(false);
    bootAuth();
  </script>
</body>
</html>
