<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ForgePro - Logowanie</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Firebase SDK v10 -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { 
    getAuth, 
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signInWithPopup,
    GoogleAuthProvider,
    OAuthProvider,
    sendEmailVerification,
    sendPasswordResetEmail,
    onAuthStateChanged,
    signOut 
  } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

  // ========== FIREBASE CONFIG ==========
  // ZASTĄP SWOIMI DANYMI Z FIREBASE CONSOLE
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "your-project.firebaseapp.com",
    projectId: "your-project-id",
    storageBucket: "your-project.appspot.com",
    messagingSenderId: "123456789",
    appId: "1:123456789:web:abcdef123456"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();
  const appleProvider = new OAuthProvider('apple.com');

  // ========== STATE MANAGEMENT ==========
  let currentUser = null;

  // Nasłuchuj zmiany stanu autoryzacji
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      console.log('Zalogowany:', user.email);
      showApp(); // Pokaż główną aplikację
    } else {
      currentUser = null;
      showAuth(); // Pokaż ekran logowania
    }
  });

  // ========== EMAIL/PASSWORD FUNCTIONS ==========
  
  async function registerWithEmail(email, password) {
    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      await sendEmailVerification(userCredential.user);
      alert('Rejestracja OK! Sprawdź email i potwierdź konto.');
      return userCredential.user;
    } catch (error) {
      handleAuthError(error);
    }
  }

  async function loginWithEmail(email, password) {
    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      
      // Sprawdź czy email zweryfikowany
      if (!userCredential.user.emailVerified) {
        alert('Zweryfikuj najpierw email! Sprawdź skrzynkę.');
        await signOut(auth);
        return;
      }
      
      console.log('Zalogowano:', userCredential.user.email);
      return userCredential.user;
    } catch (error) {
      handleAuthError(error);
    }
  }

  async function resetPassword(email) {
    try {
      await sendPasswordResetEmail(auth, email);
      alert('Link do resetu hasła wysłany na email!');
    } catch (error) {
      handleAuthError(error);
    }
  }

  // ========== SOCIAL LOGIN FUNCTIONS ==========

  async function loginWithGoogle() {
    try {
      const result = await signInWithPopup(auth, googleProvider);
      console.log('Google login OK:', result.user.email);
      return result.user;
    } catch (error) {
      handleAuthError(error);
    }
  }

  async function loginWithApple() {
    try {
      const result = await signInWithPopup(auth, appleProvider);
      console.log('Apple login OK:', result.user.email || 'hidden email');
      return result.user;
    } catch (error) {
      handleAuthError(error);
    }
  }

  // ========== LOGOUT ==========
  
  async function logout() {
    try {
      await signOut(auth);
      console.log('Wylogowano');
    } catch (error) {
      console.error('Błąd wylogowania:', error);
    }
  }

  // ========== ERROR HANDLING ==========
  
  function handleAuthError(error) {
    const errorMessages = {
      'auth/email-already-in-use': 'Ten email jest już zarejestrowany!',
      'auth/invalid-email': 'Nieprawidłowy format email!',
      'auth/weak-password': 'Hasło za słabe! Min. 6 znaków.',
      'auth/user-not-found': 'Użytkownik nie istnieje!',
      'auth/wrong-password': 'Błędne hasło!',
      'auth/too-many-requests': 'Za dużo prób! Odczekaj chwilę.',
      'auth/network-request-failed': 'Brak internetu!',
      'auth/popup-closed-by-user': 'Anulowano logowanie',
    };
    
    const message = errorMessages[error.code] || error.message;
    alert('❌ ' + message);
    console.error('Auth error:', error);
  }

  // ========== UI CONTROL ==========
  
  function showAuth() {
    document.getElementById('auth-screen').classList.add('active');
    document.getElementById('app-screen').classList.remove('active');
  }

  function showApp() {
    document.getElementById('auth-screen').classList.remove('active');
    document.getElementById('app-screen').classList.add('active');
    
    // Wypełnij dane użytkownika
    if (currentUser) {
      document.getElementById('user-email').textContent = currentUser.email || 'Użytkownik';
      document.getElementById('user-verified').textContent = currentUser.emailVerified ? '✓ Zweryfikowany' : '⚠ Niezweryfikowany';
    }
  }

  // ========== EVENT LISTENERS ==========
  
  window.addEventListener('DOMContentLoaded', () => {
    
    // Przełączanie między login/register
    document.getElementById('show-register').addEventListener('click', () => {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('register-form').style.display = 'block';
    });
    
    document.getElementById('show-login').addEventListener('click', () => {
      document.getElementById('register-form').style.display = 'none';
      document.getElementById('login-form').style.display = 'block';
    });

    // Rejestracja
    document.getElementById('register-btn').addEventListener('click', () => {
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      
      if (!email || !password) {
        alert('Wypełnij wszystkie pola!');
        return;
      }
      
      registerWithEmail(email, password);
    });

    // Logowanie email
    document.getElementById('login-btn').addEventListener('click', () => {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      
      if (!email || !password) {
        alert('Wypełnij wszystkie pola!');
        return;
      }
      
      loginWithEmail(email, password);
    });

    // Reset hasła
    document.getElementById('forgot-password').addEventListener('click', () => {
      const email = prompt('Podaj email do resetu hasła:');
      if (email) {
        resetPassword(email);
      }
    });

    // Google login
    document.getElementById('google-login').addEventListener('click', loginWithGoogle);

    // Apple login
    document.getElementById('apple-login').addEventListener('click', loginWithApple);

    // Logout
    document.getElementById('logout-btn').addEventListener('click', logout);

    // Resend verification
    document.getElementById('resend-verification').addEventListener('click', async () => {
      if (currentUser && !currentUser.emailVerified) {
        try {
          await sendEmailVerification(currentUser);
          alert('Email weryfikacyjny wysłany ponownie!');
        } catch (error) {
          handleAuthError(error);
        }
      }
    });

  });

</script>

<style>
:root {
  --bg: #080810;
  --surface: #111118;
  --surface2: #17171f;
  --border: #252532;
  --orange: #E07B39;
  --orange-dim: rgba(224,123,57,0.08);
  --text: #EEEDF0;
  --muted: #5a5a6e;
  --radius: 14px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  max-width: 430px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
}

.screen {
  display: none;
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.screen.active {
  display: flex;
  flex-direction: column;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ========== AUTH SCREEN ========== */

.auth-container {
  max-width: 400px;
  margin: auto;
  width: 100%;
}

.logo {
  text-align: center;
  margin-bottom: 40px;
}

.logo-icon {
  width: 70px;
  height: 70px;
  background: var(--orange);
  border-radius: 18px;
  margin: 0 auto 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  box-shadow: 0 8px 32px rgba(224,123,57,0.3);
}

.logo h1 {
  font-family: 'Syne', sans-serif;
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 6px;
}

.logo p {
  color: var(--muted);
  font-size: 14px;
}

.auth-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.form-group input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}

.form-group input:focus {
  border-color: var(--orange);
}

.btn-primary {
  width: 100%;
  background: var(--orange);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}

.btn-primary:active {
  transform: scale(0.98);
  box-shadow: 0 4px 20px rgba(224,123,57,0.4);
}

.divider {
  text-align: center;
  position: relative;
  margin: 20px 0;
}

.divider::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  width: 100%;
  height: 1px;
  background: var(--border);
}

.divider span {
  position: relative;
  background: var(--surface);
  padding: 0 12px;
  font-size: 12px;
  color: var(--muted);
}

.social-btns {
  display: flex;
  gap: 12px;
}

.btn-social {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.15s, border-color 0.15s;
}

.btn-social:active {
  background: var(--surface);
  border-color: var(--orange);
}

.text-link {
  text-align: center;
  font-size: 13px;
  color: var(--muted);
  margin-top: 12px;
}

.text-link button {
  background: none;
  border: none;
  color: var(--orange);
  font-weight: 600;
  cursor: pointer;
  text-decoration: underline;
}

.forgot-link {
  text-align: right;
  margin-top: 8px;
}

.forgot-link button {
  background: none;
  border: none;
  color: var(--orange);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: underline;
}

/* ========== APP SCREEN ========== */

.app-header {
  text-align: center;
  margin-bottom: 30px;
}

.app-header h2 {
  font-family: 'Syne', sans-serif;
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 8px;
}

.user-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}

.user-card h3 {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.user-card p {
  font-size: 16px;
  margin-bottom: 6px;
}

.user-card .verified {
  color: var(--orange);
  font-size: 13px;
  font-weight: 600;
}

.btn-secondary {
  width: 100%;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 12px;
}

.btn-logout {
  background: rgba(248,113,113,0.1);
  border-color: rgba(248,113,113,0.3);
  color: #F87171;
}

#register-form {
  display: none;
}
</style>

</head>
<body>

<!-- ========== AUTH SCREEN ========== -->
<div id="auth-screen" class="screen active">
  <div class="auth-container">
    
    <div class="logo">
      <div class="logo-icon">💪</div>
      <h1>ForgePro</h1>
      <p>Śledź progres, osiągaj cele</p>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="auth-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="twoj@email.com">
        </div>
        <div class="form-group">
          <label>Hasło</label>
          <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <div class="forgot-link">
          <button id="forgot-password">Zapomniałeś hasła?</button>
        </div>
        <button class="btn-primary" id="login-btn">Zaloguj się</button>
      </div>

      <div class="divider"><span>lub</span></div>

      <div class="social-btns">
        <button class="btn-social" id="google-login">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>
        <button class="btn-social" id="apple-login">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
          </svg>
          Apple
        </button>
      </div>

      <div class="text-link">
        Nie masz konta? <button id="show-register">Zarejestruj się</button>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-form">
      <div class="auth-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="twoj@email.com">
        </div>
        <div class="form-group">
          <label>Hasło</label>
          <input type="password" id="reg-password" placeholder="min. 6 znaków">
        </div>
        <button class="btn-primary" id="register-btn">Utwórz konto</button>
      </div>

      <div class="text-link">
        Masz już konto? <button id="show-login">Zaloguj się</button>
      </div>
    </div>

  </div>
</div>

<!-- ========== APP SCREEN ========== -->
<div id="app-screen" class="screen">
  <div class="app-header">
    <h2>🎉 Zalogowano!</h2>
  </div>

  <div class="user-card">
    <h3>Twoje konto</h3>
    <p id="user-email">email@example.com</p>
    <p class="verified" id="user-verified">✓ Zweryfikowany</p>
    <button class="btn-secondary" id="resend-verification">Wyślij ponownie email weryfikacyjny</button>
  </div>

  <div style="background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px;">
    <h3 style="font-size: 14px; color: var(--muted); margin-bottom: 12px;">TWOJE TRENINGI</h3>
    <p style="color: var(--muted);">Tutaj będzie główna aplikacja ForgePro po zalogowaniu...</p>
  </div>

  <button class="btn-secondary btn-logout" id="logout-btn">Wyloguj się</button>
</div>

</body>
</html>
