<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForgePro - Neural Fitness System</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  font-family: 'Rajdhani', sans-serif;
  overflow-x: hidden;
  cursor: crosshair;
}

.hero {
  position: relative;
  width: 100%;
  min-height: 100vh;
  background: 
    radial-gradient(circle at 20% 50%, rgba(224,123,57,0.15) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(52,211,153,0.15) 0%, transparent 50%),
    radial-gradient(circle at 50% 20%, rgba(96,165,250,0.15) 0%, transparent 50%),
    #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  overflow: hidden;
}

/* SCANLINES */
.scanlines {
  position: absolute;
  inset: 0;
  background: 
    repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.03) 0px,
      transparent 1px,
      transparent 2px,
      rgba(255,255,255,0.03) 3px
    );
  pointer-events: none;
  animation: scanline 10s linear infinite;
}

@keyframes scanline {
  0% { transform: translateY(0); }
  100% { transform: translateY(100px); }
}

/* GRID */
.grid {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(224,123,57,0.1) 1px, transparent 1px),
    linear-gradient(90deg, rgba(224,123,57,0.1) 1px, transparent 1px);
  background-size: 100px 100px;
  transform: perspective(500px) rotateX(60deg);
  transform-origin: center center;
  opacity: 0.3;
}

/* NEON CIRCLES */
.neon-circle {
  position: absolute;
  border-radius: 50%;
  border: 2px solid;
  animation: pulse-neon 4s ease-in-out infinite;
}

.circle1 {
  width: 300px;
  height: 300px;
  top: 10%;
  left: 10%;
  border-color: #E07B39;
  animation-delay: 0s;
  box-shadow: 
    0 0 20px rgba(224,123,57,0.5),
    inset 0 0 20px rgba(224,123,57,0.2);
}

.circle2 {
  width: 200px;
  height: 200px;
  bottom: 20%;
  right: 15%;
  border-color: #34D399;
  animation-delay: 1s;
  box-shadow: 
    0 0 20px rgba(52,211,153,0.5),
    inset 0 0 20px rgba(52,211,153,0.2);
}

.circle3 {
  width: 250px;
  height: 250px;
  top: 50%;
  right: 10%;
  border-color: #60A5FA;
  animation-delay: 2s;
  box-shadow: 
    0 0 20px rgba(96,165,250,0.5),
    inset 0 0 20px rgba(96,165,250,0.2);
}

@keyframes pulse-neon {
  0%, 100% {
    transform: scale(1);
    opacity: 0.3;
  }
  50% {
    transform: scale(1.1);
    opacity: 0.6;
  }
}

/* GLOWING PARTICLES */
.glowparticle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: #E07B39;
  border-radius: 50%;
  box-shadow: 0 0 10px #E07B39;
  animation: float-glow 20s ease-in-out infinite;
}

.glowparticle:nth-child(1) { top: 15%; left: 20%; animation-delay: 0s; }
.glowparticle:nth-child(2) { top: 35%; right: 25%; animation-delay: 3s; background: #34D399; box-shadow: 0 0 10px #34D399; }
.glowparticle:nth-child(3) { bottom: 25%; left: 30%; animation-delay: 6s; background: #60A5FA; box-shadow: 0 0 10px #60A5FA; }
.glowparticle:nth-child(4) { top: 60%; right: 35%; animation-delay: 9s; }
.glowparticle:nth-child(5) { bottom: 40%; left: 15%; animation-delay: 12s; background: #34D399; box-shadow: 0 0 10px #34D399; }

@keyframes float-glow {
  0%, 100% {
    transform: translate(0, 0);
    opacity: 0.5;
  }
  25% {
    transform: translate(100px, -100px);
    opacity: 1;
  }
  50% {
    transform: translate(-50px, 50px);
    opacity: 0.5;
  }
  75% {
    transform: translate(50px, 100px);
    opacity: 1;
  }
}

/* CONTENT */
.content {
  position: relative;
  z-index: 10;
  text-align: center;
  max-width: 900px;
}

.glitch-wrapper {
  position: relative;
  display: inline-block;
}

.tag {
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.4em;
  color: #34D399;
  text-transform: uppercase;
  margin-bottom: 30px;
  display: inline-block;
  padding: 8px 20px;
  border: 1px solid #34D399;
  box-shadow: 
    0 0 10px rgba(52,211,153,0.5),
    inset 0 0 10px rgba(52,211,153,0.1);
  animation: 
    fadeInDown 0.8s ease 0.2s both,
    glow-pulse 2s ease-in-out infinite;
}

@keyframes glow-pulse {
  0%, 100% { box-shadow: 0 0 10px rgba(52,211,153,0.5), inset 0 0 10px rgba(52,211,153,0.1); }
  50% { box-shadow: 0 0 20px rgba(52,211,153,0.8), inset 0 0 10px rgba(52,211,153,0.2); }
}

.logo-cyber {
  width: 120px;
  height: 120px;
  margin: 0 auto 40px;
  position: relative;
  animation: fadeInScale 0.8s ease 0.3s both;
}

.logo-hex {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #E07B39, #FF9A6C);
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 56px;
  box-shadow: 
    0 0 40px rgba(224,123,57,0.6),
    inset 0 0 20px rgba(0,0,0,0.5);
  animation: rotate-hex 20s linear infinite;
}

@keyframes rotate-hex {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.logo-hex::before {
  content: '';
  position: absolute;
  inset: -8px;
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  border: 2px solid #E07B39;
  box-shadow: 0 0 20px rgba(224,123,57,0.8);
}

.title-cyber {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(64px, 14vw, 120px);
  font-weight: 900;
  line-height: 1;
  color: #fff;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 20px;
  animation: fadeInUp 0.8s ease 0.4s both;
  text-shadow: 
    0 0 10px rgba(224,123,57,0.8),
    0 0 20px rgba(224,123,57,0.6),
    0 0 30px rgba(224,123,57,0.4),
    0 4px 8px rgba(0,0,0,0.8);
  position: relative;
}

.title-cyber::before {
  content: attr(data-text);
  position: absolute;
  left: 2px;
  top: 0;
  color: #E07B39;
  z-index: -1;
  animation: glitch-1 3s infinite;
}

.title-cyber::after {
  content: attr(data-text);
  position: absolute;
  left: -2px;
  top: 0;
  color: #34D399;
  z-index: -2;
  animation: glitch-2 3s infinite;
}

@keyframes glitch-1 {
  0%, 90%, 100% { transform: translate(0); }
  91% { transform: translate(-3px, -2px); }
  92% { transform: translate(3px, 2px); }
  93% { transform: translate(-2px, 1px); }
}

@keyframes glitch-2 {
  0%, 90%, 100% { transform: translate(0); }
  91% { transform: translate(3px, 2px); }
  92% { transform: translate(-3px, -2px); }
  93% { transform: translate(2px, -1px); }
}

.subtitle-cyber {
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(18px, 3vw, 24px);
  font-weight: 500;
  color: rgba(255,255,255,0.8);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  max-width: 700px;
  margin: 0 auto 50px;
  line-height: 1.6;
  animation: fadeInUp 0.8s ease 0.5s both;
}

.accent {
  color: #E07B39;
  text-shadow: 0 0 10px rgba(224,123,57,0.8);
  font-weight: 700;
}

/* CTA */
.cta-cyber {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 20px 50px;
  background: transparent;
  border: 2px solid #E07B39;
  color: #E07B39;
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
  animation: fadeInUp 0.8s ease 0.6s both;
  box-shadow: 
    0 0 20px rgba(224,123,57,0.3),
    inset 0 0 20px rgba(224,123,57,0.1);
}

.cta-cyber::before {
  content: '';
  position: absolute;
  inset: 0;
  background: #E07B39;
  transform: translateX(-100%);
  transition: transform 0.5s;
  z-index: -1;
  box-shadow: 0 0 40px rgba(224,123,57,0.8);
}

.cta-cyber:hover {
  color: #000;
  box-shadow: 
    0 0 40px rgba(224,123,57,0.8),
    inset 0 0 20px rgba(224,123,57,0.2);
}

.cta-cyber:hover::before {
  transform: translateX(0);
}

.cta-cyber svg {
  transition: transform 0.3s;
}

.cta-cyber:hover svg {
  transform: translateX(6px);
}

/* STATS HUD */
.stats-hud {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 40px;
  animation: fadeInUp 0.8s ease 0.7s both;
}

.stat-cyber {
  text-align: center;
  font-family: 'Orbitron', sans-serif;
  padding: 16px 24px;
  background: rgba(0,0,0,0.7);
  border: 1px solid #E07B39;
  clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
  box-shadow: 
    0 0 20px rgba(224,123,57,0.3),
    inset 0 0 10px rgba(224,123,57,0.05);
}

.stat-value-cyber {
  font-size: 28px;
  font-weight: 900;
  color: #E07B39;
  display: block;
  margin-bottom: 4px;
  text-shadow: 0 0 10px rgba(224,123,57,0.8);
}

.stat-label-cyber {
  font-size: 10px;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
}

/* ANIMATIONS */
@keyframes fadeInDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeInScale {
  from {
    opacity: 0;
    transform: scale(0.5) rotate(-180deg);
  }
  to {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .stats-hud {
    gap: 20px;
    flex-wrap: wrap;
    max-width: 90%;
  }
  
  .neon-circle {
    display: none;
  }
}
</style>
</head>
<body>

<div class="hero">
  <!-- Effects -->
  <div class="scanlines"></div>
  <div class="grid"></div>
  
  <!-- Neon circles -->
  <div class="neon-circle circle1"></div>
  <div class="neon-circle circle2"></div>
  <div class="neon-circle circle3"></div>
  
  <!-- Glowing particles -->
  <div class="glowparticle"></div>
  <div class="glowparticle"></div>
  <div class="glowparticle"></div>
  <div class="glowparticle"></div>
  <div class="glowparticle"></div>
  
  <!-- Content -->
  <div class="content">
    <div class="tag">Neural Training System</div>
    
    <div class="logo-cyber">
      <div class="logo-hex">💪</div>
    </div>
    
    <h1 class="title-cyber" data-text="FORGEPRO">FORGEPRO</h1>
    
    <p class="subtitle-cyber">
      Unlock Your <span class="accent">Maximum Potential</span><br>
      With AI-Powered Fitness Analytics
    </p>
    
    <a href="#" class="cta-cyber">
      Initialize Training
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"></line>
        <polyline points="12 5 19 12 12 19"></polyline>
      </svg>
    </a>
  </div>
  
  <!-- Stats HUD -->
  <div class="stats-hud">
    <div class="stat-cyber">
      <span class="stat-value-cyber">AI</span>
      <span class="stat-label-cyber">Powered</span>
    </div>
    <div class="stat-cyber">
      <span class="stat-value-cyber">24/7</span>
      <span class="stat-label-cyber">Available</span>
    </div>
    <div class="stat-cyber">
      <span class="stat-value-cyber">FREE</span>
      <span class="stat-label-cyber">Forever</span>
    </div>
  </div>
</div>

</body>
</html>
