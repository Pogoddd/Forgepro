<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForgePro - Forge Your Strength</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0a0a0a;
  font-family: 'Space Mono', monospace;
  overflow-x: hidden;
}

.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  background: 
    linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ANIMATED GRID BACKGROUND */
.grid-bg {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(224,123,57,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(224,123,57,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridSlide 20s linear infinite;
  opacity: 0.4;
}

@keyframes gridSlide {
  0% { transform: translate(0, 0); }
  100% { transform: translate(50px, 50px); }
}

/* NOISE TEXTURE */
.noise {
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
  mix-blend-mode: overlay;
  pointer-events: none;
}

/* GLITCH BARS */
.glitch-bar {
  position: absolute;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, #E07B39, transparent);
  animation: glitchSweep 8s ease-in-out infinite;
}

.glitch-bar:nth-child(1) {
  top: 20%;
  animation-delay: 0s;
}

.glitch-bar:nth-child(2) {
  top: 60%;
  animation-delay: 2s;
}

.glitch-bar:nth-child(3) {
  top: 80%;
  animation-delay: 4s;
}

@keyframes glitchSweep {
  0%, 100% { opacity: 0; transform: translateX(-100%); }
  10% { opacity: 1; }
  40% { opacity: 1; }
  50% { opacity: 0; transform: translateX(100%); }
}

/* CONTENT */
.content {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 0 20px;
}

.label {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.3em;
  color: #E07B39;
  text-transform: uppercase;
  margin-bottom: 24px;
  animation: fadeInUp 0.8s ease 0.2s both;
}

.logo-mark {
  width: 90px;
  height: 90px;
  background: #E07B39;
  border: 3px solid #E07B39;
  box-shadow: 
    0 0 0 6px #0a0a0a,
    0 0 0 9px #E07B39,
    0 0 40px rgba(224,123,57,0.5),
    inset 0 0 20px rgba(0,0,0,0.5);
  margin: 0 auto 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  animation: 
    fadeInUp 0.8s ease 0.3s both,
    pulse 3s ease-in-out infinite;
  position: relative;
}

.logo-mark::before {
  content: '';
  position: absolute;
  inset: -20px;
  border: 1px solid rgba(224,123,57,0.2);
  animation: rotate 20s linear infinite;
}

@keyframes rotate {
  to { transform: rotate(360deg); }
}

@keyframes pulse {
  0%, 100% { box-shadow: 
    0 0 0 6px #0a0a0a,
    0 0 0 9px #E07B39,
    0 0 40px rgba(224,123,57,0.5),
    inset 0 0 20px rgba(0,0,0,0.5); }
  50% { box-shadow: 
    0 0 0 6px #0a0a0a,
    0 0 0 9px #E07B39,
    0 0 60px rgba(224,123,57,0.8),
    inset 0 0 20px rgba(0,0,0,0.5); }
}

.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(72px, 15vw, 140px);
  font-weight: 400;
  line-height: 0.9;
  color: #fff;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 20px;
  animation: fadeInUp 0.8s ease 0.4s both;
  text-shadow: 
    0 0 20px rgba(224,123,57,0.3),
    0 4px 8px rgba(0,0,0,0.8);
  position: relative;
}

.title span {
  display: inline-block;
  position: relative;
}

.title span::after {
  content: attr(data-text);
  position: absolute;
  left: 2px;
  top: 2px;
  color: rgba(224,123,57,0.4);
  z-index: -1;
  animation: glitch 5s infinite;
}

@keyframes glitch {
  0%, 90%, 100% { transform: translate(0); }
  91% { transform: translate(-2px, 1px); }
  92% { transform: translate(2px, -1px); }
  93% { transform: translate(0); }
}

.tagline {
  font-family: 'Space Mono', monospace;
  font-size: clamp(14px, 2.5vw, 18px);
  font-weight: 700;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 50px;
  animation: fadeInUp 0.8s ease 0.5s both;
  border-top: 1px solid rgba(224,123,57,0.3);
  border-bottom: 1px solid rgba(224,123,57,0.3);
  padding: 12px 0;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  margin-bottom: 50px;
}

.cta {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 18px 40px;
  background: transparent;
  border: 2px solid #E07B39;
  color: #E07B39;
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  animation: fadeInUp 0.8s ease 0.6s both;
  transition: all 0.3s;
}

.cta::before {
  content: '';
  position: absolute;
  inset: 0;
  background: #E07B39;
  transform: translateX(-100%);
  transition: transform 0.4s;
  z-index: -1;
}

.cta:hover {
  color: #000;
  box-shadow: 0 0 30px rgba(224,123,57,0.6);
}

.cta:hover::before {
  transform: translateX(0);
}

.cta svg {
  width: 16px;
  height: 16px;
  transition: transform 0.3s;
}

.cta:hover svg {
  transform: translateX(4px);
}

/* STATS SECTION */
.stats {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 60px;
  animation: fadeInUp 0.8s ease 0.7s both;
}

.stat {
  text-align: center;
  font-family: 'Space Mono', monospace;
}

.stat-value {
  font-size: 32px;
  font-weight: 700;
  color: #E07B39;
  display: block;
  margin-bottom: 4px;
  text-shadow: 0 0 10px rgba(224,123,57,0.5);
}

.stat-label {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
}

/* CORNER DECORATIONS */
.corner {
  position: absolute;
  width: 80px;
  height: 80px;
  border: 2px solid rgba(224,123,57,0.3);
}

.corner.tl {
  top: 20px;
  left: 20px;
  border-right: none;
  border-bottom: none;
  animation: fadeIn 1s ease 1s both;
}

.corner.tr {
  top: 20px;
  right: 20px;
  border-left: none;
  border-bottom: none;
  animation: fadeIn 1s ease 1.1s both;
}

.corner.bl {
  bottom: 20px;
  left: 20px;
  border-right: none;
  border-top: none;
  animation: fadeIn 1s ease 1.2s both;
}

.corner.br {
  bottom: 20px;
  right: 20px;
  border-left: none;
  border-top: none;
  animation: fadeIn 1s ease 1.3s both;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .stats {
    gap: 40px;
    bottom: 30px;
  }
  
  .stat-value {
    font-size: 24px;
  }
  
  .corner {
    width: 50px;
    height: 50px;
  }
}

@media (max-width: 480px) {
  .stats {
    gap: 30px;
    flex-wrap: wrap;
    max-width: 300px;
  }
}
</style>
</head>
<body>

<div class="hero">
  <!-- Background effects -->
  <div class="grid-bg"></div>
  <div class="noise"></div>
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>
  
  <!-- Corner decorations -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  
  <!-- Main content -->
  <div class="content">
    <div class="label">AI-Powered Training</div>
    
    <div class="logo-mark">💪</div>
    
    <h1 class="title">
      <span data-text="FORGE">FORGE</span><br>
      <span data-text="PRO">PRO</span>
    </h1>
    
    <p class="tagline">Track • Analyze • Dominate</p>
    
    <a href="#" class="cta">
      Dołącz teraz
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"></line>
        <polyline points="12 5 19 12 12 19"></polyline>
      </svg>
    </a>
  </div>
  
  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <span class="stat-value">AI</span>
      <span class="stat-label">Coach</span>
    </div>
    <div class="stat">
      <span class="stat-value">∞</span>
      <span class="stat-label">Progress</span>
    </div>
    <div class="stat">
      <span class="stat-value">0$</span>
      <span class="stat-label">Free</span>
    </div>
  </div>
</div>

</body>
</html>
